
# .github/workflows/deploy.yml

name: Deploy Backend to AWS

# This workflow runs on any push to the 'main' branch
on:
  push:
    branches:
      - main
      - develop

jobs:
  # Linting job - runs first and blocks deployment if code quality issues found
  lint:
    name: Lint Code
    runs-on: blacksmith-2vcpu-ubuntu-2404
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        working-directory: src
        run: npm ci

      - name: Run ESLint
        working-directory: src
        run: |
          echo "Running ESLint with zero warnings policy..."
          npx eslint \
            controllers/**/*.ts \
            utils/**/*.ts \
            models/*.ts \
            types/**/*.ts \
            db/*.ts \
            app.ts \
            --no-ignore \
            --max-warnings 0

      - name: Run TypeScript type check
        working-directory: src
        run: |
          echo "Running TypeScript compiler check..."
          npx tsc --noEmit

  # Deploy job - only runs after linting passes
  deploy:
    name: Deploy to AWS
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: lint
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # PASTE THE ARN OF THE ROLE YOU CREATED IN AWS HERE
          role-to-assume: arn:aws:iam::940900040930:role/GitHubActionsSamDeployRole
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Build SAM Application
        run: sam build --use-container

      - name: Deploy SAM Application
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset
