            Path: /products
            Method: get
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/products/getAllProducts.ts]

  UpdateProductFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/
      Handler: controllers/products/updateProduct.lambdaHandler
      Events:
        UpdateProduct:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /products/{productId}
            Method: patch
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/products/updateProduct.ts]

  UpdateProductDataFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/
      Handler: controllers/products/updateProductData.lambdaHandler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub "arn:aws:s3:::${UploadsBucket}/uploads/*"
      Events:
        UpdateProductData:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /products/productData
            Method: patch
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/products/updateProductData.ts]

  GetProductDataFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/
      Handler: controllers/products/getProductData.lambdaHandler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${UploadsBucket}/uploads/*"
      Events:
        GetProductData:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /products/productData
            Method: get
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/products/getProductData.ts]

  CreateProductVersionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: controllers/products/createProductVersion.lambdaHandler
      Events:
        CreateProductVersion:
          Type: Api
          Properties:
            Path: /products/{productId}/version
            Method: post
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/products/createProductVersion.ts]

  GetAllProductVersionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: controllers/products/getAllProductVersions.lambdaHandler
      Events:
        GetAllProductVersions:
          Type: Api
          Properties:
            Path: /products/versions
            Method: get
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/products/getAllProductVersions.ts]

  EnqueueProductExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: controllers/products/enqueueProductExport.lambdaHandler
      Environment:
        Variables:
          EXPORT_JOB_QUEUE_URL: !If [HasExportJobQueueUrl, !Ref ExportJobQueueUrl, !Ref ProductExportJobQueue]
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !If
                - HasExportJobQueueUrl
                - !Sub
                  - arn:${AWS::Partition}:sqs:${QueueRegion}:${QueueAccountId}:${QueueName}
                  - QueueRegion: !Select [1, !Split [".", !Select [2, !Split ["/", !Ref ExportJobQueueUrl]]]]
                    QueueAccountId: !Select [3, !Split ["/", !Ref ExportJobQueueUrl]]
                    QueueName: !Select [4, !Split ["/", !Ref ExportJobQueueUrl]]
                - !GetAtt ProductExportJobQueue.Arn
      Events:
        EnqueueProductExport:
          Type: Api
          Properties:
            Path: /products/{productId}/exports
            Method: post
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/products/enqueueProductExport.ts]

  GetProductExportJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: controllers/products/getProductExportJobs.lambdaHandler
      Events:
        GetProductExportJobs:
          Type: Api
          Properties:
            Path: /products/exports/jobs
            Method: get
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/products/getProductExportJobs.ts]

  GetProductExportJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: controllers/products/getProductExportJob.lambdaHandler
      Events:
        GetProductExportJob:
          Type: Api
          Properties:
            Path: /products/exports/jobs/{jobId}
            Method: get
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/products/getProductExportJob.ts]

  DownloadProductExportJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: controllers/products/downloadProductExportJob.lambdaHandler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${ExportsBucket}/*"
      Events:
        DownloadProductExportJob:
          Type: Api
          Properties:
            Path: /products/exports/jobs/{jobId}/download
            Method: get
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/products/downloadProductExportJob.ts]

  ProductExportJobDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-product-export-job-dlq"
      MessageRetentionPeriod: 1209600

  ProductExportJobQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-product-export-job-queue"
      VisibilityTimeout: 5400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ProductExportJobDLQ.Arn
        maxReceiveCount: 5

  ProcessProductExportJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: controllers/exports/processExportJob.lambdaHandler
      Timeout: 900
      MemorySize: 3008
      Environment:
        Variables:
          EXPORTS_PREFIX: exports
          EXPORT_JOB_MAX_RECEIVE_COUNT: 5
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
                - sqs:ChangeMessageVisibility
              Resource: !GetAtt ProductExportJobQueue.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${UploadsBucket}/uploads/*"
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${ExportsBucket}/*"
      Events:
        ProductExportQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ProductExportJobQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/exports/processExportJob.ts]

