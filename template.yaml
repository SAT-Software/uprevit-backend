      Environment:
        Variables:
          EXPORT_JOB_QUEUE_URL: !If [HasExportJobQueueUrl, !Ref ExportJobQueueUrl, !Ref ProductExportJobQueue]
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !If
                - HasExportJobQueueUrl
                - !Sub
                  - arn:${AWS::Partition}:sqs:${QueueRegion}:${QueueAccountId}:${QueueName}
