        EntryPoints: [controllers/users/getAllUsersByWorkspace.ts]

  # ──────────────────────────────────────────────────────────────────────────
  # ONBOARDING
  # ──────────────────────────────────────────────────────────────────────────
  AdminOnboardingCreateWorkspaceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: controllers/onboarding/adminOnboardingCreateWorkspace.lambdaHandler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminUpdateUserAttributes
                - cognito-idp:AdminAddUserToGroup
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub "arn:aws:s3:::${UploadsBucket}/uploads/*"
      Events:
        AdminOnboardingCreateWorkspace:
          Type: Api
          Properties:
            Path: /onboarding/admin/workspace
            Method: post
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/onboarding/adminOnboardingCreateWorkspace.ts]

  InviteNewUserByAdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: controllers/onboarding/InviteNewUserByAdmin.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminUpdateUserAttributes
                - cognito-idp:AdminAddUserToGroup
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}"
      Events:
