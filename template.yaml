  ProductExportJobDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-product-export-job-dlq"
      MessageRetentionPeriod: 1209600

  ProductExportJobQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-product-export-job-queue"
      VisibilityTimeout: 5400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ProductExportJobDLQ.Arn
        maxReceiveCount: 5

  ProcessProductExportJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: controllers/exports/processExportJob.lambdaHandler
      Timeout: 900
      MemorySize: 3008
      Environment:
        Variables:
          EXPORTS_PREFIX: exports
          EXPORT_JOB_MAX_RECEIVE_COUNT: 5
          CHARGEBEE_SITE: !Ref ChargebeeSite
          CHARGEBEE_API_KEY: !Ref ChargebeeApiKey
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
                - sqs:ChangeMessageVisibility
              Resource: !GetAtt ProductExportJobQueue.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${UploadsBucket}/uploads/*"
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${ExportsBucket}/*"
      Events:
        ProductExportQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ProductExportJobQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/exports/processExportJob.ts]

