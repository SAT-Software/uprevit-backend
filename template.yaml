AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  uprevit-backend

  Sample SAM Template for uprevit-backend

Parameters:
  MongoDbUri:
    Type: String
    Description: "Optional direct MongoDB connection string URI for local use"
    Default: ""
  MongoDbUriParameter:
    Type: String
    Description: "Optional SSM SecureString parameter name containing the MongoDB connection string"
    Default: ""
  DbName:
    Type: String
    Description: "MongoDB database name"
    Default: "uprevit-test"
  UserPoolId:
    Type: String
    Description: "The Cognito User Pool ID for token validation"
  ClientId:
    Type: String
    Description: "The Cognito App Client ID for token validation"
  UploadsBucket:
    Type: String
    Description: "S3 bucket name for uploaded files"
    Default: "uprevit-storage-dev-and-test"
  ExportsBucket:
    Type: String
    Description: "S3 bucket name for generated export files"
    Default: "exports-storage-dev-and-test"
  ExportJobQueueUrl:
    Type: String
    Description: "Optional explicit SQS queue URL override for local/dev"
    Default: ""

# ──────────────────────────────────────────────────────────────────────────
# TOP-LEVEL METADATA  – YAML anchor for the build recipe
# ──────────────────────────────────────────────────────────────────────────
Metadata:
  # Common part that never changes
  EsbuildBase: &EsbuildBase
    BuildMethod: esbuild

  # Common BuildProperties (minus EntryPoints)
  EsbuildProps: &EsbuildProps
    Minify: true
    Target: es2020
    Sourcemap: true

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 120
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Tracing: Active
    Environment:
      Variables:
        MONGODB_URI: !If
          - HasMongoDbUri
          - !Ref MongoDbUri
          - !If
            - HasMongoDbUriParameter
            - !Sub "{{resolve:ssm-secure:${MongoDbUriParameter}}}"
            - ""
        DB_NAME: !Ref DbName
        USER_POOL_ID: !Ref UserPoolId
        CLIENT_ID: !Ref ClientId
        UPLOADS_BUCKET: !Ref UploadsBucket
        EXPORTS_BUCKET: !Ref ExportsBucket
    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON

  Api:
    TracingEnabled: true

Conditions:
  HasMongoDbUri: !Not [!Equals [!Ref MongoDbUri, ""]]
  HasMongoDbUriParameter: !Not [!Equals [!Ref MongoDbUriParameter, ""]]
  HasExportJobQueueUrl: !Not [!Equals [!Ref ExportJobQueueUrl, ""]]

Resources:
  HelloWorldFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/
      Handler: app.lambdaHandler
      Events:
        HelloWorld:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /hello
            Method: get
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [app.ts]

  # ──────────────────────────────────────────────────────────────────────────
  # USERS
  # ──────────────────────────────────────────────────────────────────────────
  CreateUserFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/
      Handler: controllers/users/createUser.lambdaHandler
      Events:
        CreateUser:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /users
            Method: post
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
