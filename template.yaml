      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/onboarding/InviteNewUserByAdmin.ts]

  OnboardAndUpdateInvitedUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: controllers/onboarding/onboardAndUpdateInvitedUser.handler
      Events:
        OnboardAndUpdateInvitedUser:
