AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  uprevit-backend

  Sample SAM Template for uprevit-backend

Parameters:
  MongoDbUri:
    Type: String
    Description: "MongoDB connection string URI"
    NoEcho: true
    Default: ""
  DbName:
    Type: String
    Description: "MongoDB database name"
    Default: "uprevit-test"
  UserPoolId:
    Type: String
    Description: "The Cognito User Pool ID for token validation"
  ClientId:
    Type: String
    Description: "The Cognito App Client ID for token validation"
  UploadsBucket:
    Type: String
    Description: "S3 bucket name for uploaded files"
    Default: "uprevit-storage-dev-and-test"
  ExportsBucket:
    Type: String
    Description: "S3 bucket name for generated export files"
    Default: "exports-storage-dev-and-test"
  StandardSymbolsBucket:
    Type: String
    Description: "S3 bucket name for standard symbol library images"
    Default: "uprevit-standard-symbols"
  DocumentationFilesBucket:
    Type: String
    Description: "S3 bucket name for documentation media (videos, future images/PDFs)"
    Default: "uprevit-documentation-files"
  DocumentationCloudFrontDomain:
    Type: String
    Description: "CloudFront distribution domain for documentation videos (e.g. d123.cloudfront.net)"
    Default: ""
  DocumentationCloudFrontKeyPairId:
    Type: String
    Description: "CloudFront key pair id for signed documentation video URLs"
    Default: ""
  DocumentationCloudFrontPrivateKey:
    Type: String
    NoEcho: true
    Description: "CloudFront signing private key PEM (from GitHub secret at deploy)"
    Default: ""
  ExportJobQueueUrl:
    Type: String
    Description: "Optional explicit SQS queue URL override for local/dev"
    Default: ""
  ChargebeeSite:
    Type: String
    Description: "Chargebee site subdomain for usage event ingest"
    Default: ""
  ChargebeeApiKey:
    Type: String
    NoEcho: true
    Description: "Chargebee API key for usage event ingest"
    Default: ""
  ChargebeeWebhookUsername:
    Type: String
    Description: "Basic auth username for Chargebee webhooks"
    Default: ""
  ChargebeeWebhookPassword:
    Type: String
    NoEcho: true
    Description: "Basic auth password for Chargebee webhooks"
    Default: ""
  ChargebeeSeatAddonItemPriceId:
    Type: String
    Description: "Chargebee item price ID for the seat add-on"
    Default: ""
  ChargebeeSsoAddonItemPriceId:
    Type: String
    Description: "Chargebee item price ID for the SSO add-on"
    Default: ""

# ──────────────────────────────────────────────────────────────────────────
# TOP-LEVEL METADATA  – YAML anchor for the build recipe
# ──────────────────────────────────────────────────────────────────────────
Metadata:
  # Common part that never changes
  EsbuildBase: &EsbuildBase
    BuildMethod: esbuild

  # Common BuildProperties (minus EntryPoints)
  EsbuildProps: &EsbuildProps
    Minify: true
    Target: es2020
    Sourcemap: true

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 120
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    Tracing: Active
    Environment:
      Variables:
        MONGODB_URI: !Ref MongoDbUri
        DB_NAME: !Ref DbName
        USER_POOL_ID: !Ref UserPoolId
        CLIENT_ID: !Ref ClientId
        UPLOADS_BUCKET: !Ref UploadsBucket
        EXPORTS_BUCKET: !Ref ExportsBucket
        STANDARD_SYMBOLS_BUCKET: !Ref StandardSymbolsBucket
        DOCUMENTATION_FILES_BUCKET: !Ref DocumentationFilesBucket
        CHARGEBEE_SITE: !Ref ChargebeeSite
        CHARGEBEE_API_KEY: !Ref ChargebeeApiKey
        CHARGEBEE_WEBHOOK_USERNAME: !Ref ChargebeeWebhookUsername
        CHARGEBEE_WEBHOOK_PASSWORD: !Ref ChargebeeWebhookPassword
        CHARGEBEE_SEAT_ADDON_ITEM_PRICE_ID: !Ref ChargebeeSeatAddonItemPriceId
        CHARGEBEE_SSO_ADDON_ITEM_PRICE_ID: !Ref ChargebeeSsoAddonItemPriceId
    # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
    LoggingConfig:
      LogFormat: JSON

  Api:
    TracingEnabled: true

Conditions:
  HasExportJobQueueUrl: !Not [!Equals [!Ref ExportJobQueueUrl, ""]]

Resources:
  HelloWorldFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/
      Handler: app.lambdaHandler
      Events:
        HelloWorld:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /hello
            Method: get
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [app.ts]

  # ──────────────────────────────────────────────────────────────────────────
  # USERS
  # ──────────────────────────────────────────────────────────────────────────
  CreateUserFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/
      Handler: controllers/users/createUser.lambdaHandler
      Events:
        CreateUser:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /users
            Method: post
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/users/createUser.ts]

  GetUserFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/
      Handler: controllers/users/getUser.lambdaHandler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${UploadsBucket}/uploads/*"
      Events:
        GetUser:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /users/{id}
            Method: get
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/users/getUser.ts]

  UpdateUserFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/
      Handler: controllers/users/updateUser.lambdaHandler
      Events:
        UpdateUser:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            Path: /users
            Method: put
    Metadata:
      <<: *EsbuildBase
      BuildProperties:
        <<: *EsbuildProps
        EntryPoints: [controllers/users/updateUser.ts]

  DeleteUserFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
